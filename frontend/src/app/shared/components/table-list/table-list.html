<div class="table-container">

  @if(loading()){
   <app-loading-spinner/>
  }

  <table 
    mat-table  
    matSort 
    [dataSource]="items()" 
    [matSortActive]="sortSettings()?.sort ?? ''"
    [matSortDirection]="sortSettings()?.direction ?? ''"
    (matSortChange)="onSortChange($event)" 
    class="mat-shadow-2"
  >

    @for (listSetting of listSettings(); track listSetting.reference) {
      <ng-container [matColumnDef]="listSetting.reference">
        <th 
          [class]="'align-' + (listSetting.align ?? 'left')"
          mat-header-cell 
          *matHeaderCellDef 
          mat-sort-header 
          sortActionDescription="Ordenar por {{ listSetting.columnName }}"
        > 
          {{ listSetting.columnName }} 
        </th>
        <td 
          [class]="'align-' + (listSetting.align ?? 'left')"
          title="{{ listSetting.value(item) }}"
          mat-cell 
          *matCellDef="let item">
            {{ listSetting.value(item) | formatValue: listSetting.pipe }}
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef class="align-center"> Ações </th>
      <td mat-cell *matCellDef="let item" class="table-actions align-center">
        @for (action of actions(); track action.name) {
          <button matMiniFab aria-label="{{action.name}}" (click)="onActionClick(action.name, item)">
            <mat-icon>{{ action.icon }}</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="references()"></tr>
    <tr mat-row *matRowDef="let row; columns: references();"></tr>
  </table>
</div>
